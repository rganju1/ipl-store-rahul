<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rahul Ganju Store — UX Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
  :root {
    --dark: #0A0A0F;
    --card: #12121C;
    --border: rgba(255,215,0,0.15);
    --gold: #FFD700;
    --orange: #FF5E1A;
    --text: #F0EAD6;
    --muted: #7a7a9a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
  }
  header {
    padding: 40px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #FFD700, #FF5E1A);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { font-size: 0.9rem; color: var(--muted); letter-spacing: 1px; }
  .badge {
    background: rgba(255,94,26,0.15);
    border: 1px solid rgba(255,94,26,0.3);
    color: var(--orange);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 6px 14px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 40px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab-btn {
    padding: 14px 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── FLOW VIEW ── */
  .flow-wrap {
    padding: 32px 40px;
    overflow-x: auto;
  }
  .flow-wrap svg { display: block; min-width: 680px; }

  /* ── SCREENS VIEW ── */
  .screens-wrap {
    padding: 32px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .screen-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }
  .screen-card:hover { transform: translateY(-4px); border-color: rgba(255,215,0,0.4); }
  .screen-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .screen-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .screen-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; }
  .screen-body { padding: 16px 20px; }
  .step-list { list-style: none; }
  .step-list li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.4;
  }
  .step-list li:last-child { border-bottom: none; }
  .step-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* ── USER JOURNEY ── */
  .journey-wrap { padding: 32px 40px; }
  .journey-step {
    display: flex;
    gap: 20px;
    margin-bottom: 0;
  }
  .journey-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 40px;
  }
  .journey-circle {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .journey-line {
    width: 1px;
    flex: 1;
    min-height: 24px;
    background: var(--border);
    margin: 6px 0;
  }
  .journey-content {
    padding: 8px 0 28px;
    flex: 1;
  }
  .journey-content h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .journey-content p { font-size: 0.9rem; color: var(--muted); line-height: 1.5; }
  .journey-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid;
  }

  /* ── COMPONENTS ── */
  .comp-wrap { padding: 32px 40px; }
  .comp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .comp-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .comp-card h4 { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px; margin-bottom: 8px; }
  .comp-card p { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
  .comp-type {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 8px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  footer {
    padding: 24px 40px;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 1px;
  }
</style>
</head>

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

SCREENS.forEach(s => {
  sg.innerHTML += `
    <div class="screen-card">
      <div class="screen-header">
        <div class="screen-dot" style="background:${s.color}"></div>
        <div class="screen-title" style="color:${s.color}">${s.title}</div>
      </div>
      <div class="screen-body">
        <ul class="step-list">
          ${s.steps.map((step, i) => `
            <li>
              <span class="step-num" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}44">${i+1}</span>
              <span>${step}</span>
            </li>`).join('')}
        </ul>
      </div>
    </div>`;
});
